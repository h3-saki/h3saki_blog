name: Build and Deploy to EdgeOne Pages

on:
  push:
    branches:
      - master         # 你的默认分支是 master
  workflow_dispatch:    # 允许手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compress cover images
        run: |
          sudo apt-get install -y pngquant
          find ./static/img -type f \( -iname "*.jpg" -o -iname "*.jpeg" \) \
            -exec mogrify -resize "1400x>" -quality 72 {} \;
          find ./static/img -type f -iname "*.png" \
            -exec pngquant --quality=65-80 --ext .png --force {} \;
      
      - name: Optimize content images
        run: |
          find . -type f \( -iname "*.jpg" -o -iname "*.jpeg" \) \
            -not -path "./static/img/*" -not -path "./_site/*" -not -path "./vendor/*" \
            -exec mogrify -quality 85 {} \; 2>/dev/null || true
          find . -type f -iname "*.png" \
            -not -path "./static/img/*" -not -path "./_site/*" -not -path "./vendor/*" \
            -exec mogrify -quality 90 {} \; 2>/dev/null || true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy to EdgeOne Pages
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
        run: |
          npx edgeone pages deploy ./public \
            -n "h3saki-blog" \
            -t "$EDGEONE_API_TOKEN"
